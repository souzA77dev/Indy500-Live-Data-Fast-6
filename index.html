<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Live Data - 2h Running of Indy 250 - FAST 6</title>

<style>
:root {
  --bg: #0c0c0c;
  --row: #141414;
  --row-hover: #1d1d1d;
  --header: #101010;
  --border: #2a2a2a;
  --red: #c40000;
  --text: #e6e6e6;
  --muted: #a0a0a0;
  --highlight: #ffd700;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Arial Narrow", Arial, Helvetica, sans-serif;
}

header {
  background: var(--header);
  border-bottom: 3px solid var(--red);
  padding: 14px 20px;
}

header h1 {
  margin: 0;
  font-size: 20px;
  letter-spacing: 1px;
}

.table-wrap { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1100px;
}

thead th {
  background: var(--header);
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 10px 6px;
  border-bottom: 1px solid var(--border);
}

tbody tr {
  background: var(--row);
  transition: background 0.15s;
}

tbody tr:hover { background: var(--row-hover); }

td {
  padding: 10px 6px;
  font-size: 13px;
  border-bottom: 1px solid var(--border);
  text-align: center;
  white-space: nowrap;
}

td.left { text-align: left; }
td.pos { font-weight: bold; }
td.avg { font-weight: bold; color: var(--highlight); }
.car { color: var(--muted); }
</style>
</head>

<body>

<header>
  <h1>Live Data - 2h Running of Indy 250 - FAST 6</h1>
</header>

<div class="table-wrap">
<table>
  <thead>
    <tr>
      <th>P</th>
      <th>N</th>
      <th>NOME</th>
      <th>EQUIPE</th>
      <th>VOLTA 1</th>
      <th>VOLTA 2</th>
      <th>VOLTA 3</th>
      <th>VOLTA 4</th>
      <th>MÉDIA FINAL</th>
    </tr>
  </thead>
  <tbody id="grid"></tbody>
</table>
</div>

<script>
const dados = [
  { car: 28, pilot: "Otavio Marinho", team: "RP Motorsports Honda", laps: ["0:38,923","0:38,841","0:38,839","0:38,930"] },
  { car: 45, pilot: "Isac Nilton", team: "Mendonca Racing Team", laps: ["0:38,869","0:38,872","0:38,857","0:38,883"] },
  { car: 06, pilot: "Theo Torres", team: "Mendonca Racing Team", laps: ["0:39,012","0:38,953","0:38,829","0:38,824"] },
  { car: 40, pilot: "Lucas Taraciuk", team: "Need For Speed Racing", laps: ["0:38,836","0:38,867","0:38,885","0:38,888"] },
  { car: 33, pilot: "Nicolas Morais", team: "Need For Speed Racing", laps: ["0:38,874","0:38,868","0:38,845","0:38,848"] },
  { car: 07, pilot: "Tiago Souza", team: "Dallara Program Racing Team", laps: ["0:38,983","0:38,963","0:38,927","0:38,962"] }
];

function toSeconds(t) {
  if (!t) return null;
  const [m, s] = t.split(":");
  return (+m * 60) + parseFloat(s.replace(",", "."));
}

function fromSeconds(sec) {
  const m = Math.floor(sec / 60);
  const r = (sec % 60).toFixed(3);
  return String(m).padStart(2, "0") + ":" + r.padStart(6, "0");
}

// calcular médias
dados.forEach(d => {
  const tempos = d.laps.map(toSeconds).filter(t => t !== null);
  if (tempos.length === 4) {
    d.avgSeconds = tempos.reduce((a,b)=>a+b,0) / 4;
    d.avgFormatted = fromSeconds(d.avgSeconds);
  } else {
    d.avgSeconds = null;
    d.avgFormatted = "--";
  }
});

// ordenar por média
dados.sort((a,b)=>{
  if (a.avgSeconds === null) return 1;
  if (b.avgSeconds === null) return -1;
  return a.avgSeconds - b.avgSeconds;
});

// renderizar
const tbody = document.getElementById("grid");
tbody.innerHTML = "";

dados.forEach((d,i)=>{
  tbody.innerHTML += `
    <tr>
      <td class="pos">${i+1}</td>
      <td class="car">${d.car}</td>
      <td class="left">${d.pilot}</td>
      <td class="left">${d.team}</td>
      ${d.laps.map(l=>`<td>${l || "--"}</td>`).join("")}
      <td class="avg">${d.avgFormatted}</td>
    </tr>
  `;
});
</script>

</body>
</html>
